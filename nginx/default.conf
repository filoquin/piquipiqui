server {
    listen 80;

    # Convenencia: / redirige directo al dev.html
    location = / {
        return 302 /piquipiqui/static/src/dev.html;
    }

    # Archivos estáticos de la SPA servidos desde el volumen montado
    location /piquipiqui/static/ {
        alias /srv/piquipiqui/static/;

        # ES modules y XML templates necesitan los tipos correctos
        types {
            text/html              html;
            text/css               css;
            application/javascript js mjs;
            text/xml               xml;
            image/svg+xml          svg;
            font/woff2             woff2;
        }

        # Sin cache en dev para ver cambios al instante
        add_header Cache-Control "no-store";
    }

    # Todo lo demás (login, /web/, RPC) va al Odoo remoto
    location / {
        proxy_pass https://www.blancoamor.com;
        proxy_set_header Host              www.blancoamor.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longpolling de Odoo
        proxy_read_timeout 600s;
        proxy_buffering off;
    }
}
