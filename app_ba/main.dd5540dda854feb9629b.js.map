<div class="row text-center mt-2">
  <div class="col-12">
    <ul class="list-group">
      <li
        *ngFor="let item of roadmap"
        routerLink="/roadmap/{{ item.id }}"
        class="text-left list-group-item"
      >
        <i class="fa fa-fw fa-building"></i>
        <strong>{{ item["number"] }}</strong>
        <div>
          <div>
            <strong>{{
              item["preparation_date"] | date: "d/M/Y H:mm":"UTC -6"
            }}</strong>
          </div>
          <div>Conductor: {{ item["driver_user_id"][1] }}</div>
          <div>Vehiculo: {{ item["vehicle_id"][1] }}</div>
          <div>Remitos:{{ item["picking_ids"].length }}</div>
        </div>
      </li>
    </ul>
  </div>
</div>
