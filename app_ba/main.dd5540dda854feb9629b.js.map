<div class="modal-header">
  <h4 class="modal-title">Ingrese el origen</h4>
</div>
<div class="modal-body">
  <div class="container">
    <div class="form-group">
      <label for="cantidad">Origen</label>
      <input class="form-control" #someInput />
    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" (click)="cancel()">Cerrar</button>
  <button class="btn btn-primary" (click)="sendData()">Aceptar</button>
</div>
