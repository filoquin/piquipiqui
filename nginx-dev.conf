# WHM2 — servidor de desarrollo
# Copiá este archivo a /etc/nginx/sites-available/piquipiqui-dev
# y habilitalo con: sudo ln -s /etc/nginx/sites-available/piquipiqui-dev /etc/nginx/sites-enabled/
# Luego: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8090;
    server_name localhost;

    # Archivos estáticos de la SPA servidos directo desde disco
    location /piquipiqui/static/ {
        alias /opt/odoo/mig-ba/piquipiqui/static/;
    }

    # Todo lo demás (login, /web/, RPC) va a Odoo
    location / {
        proxy_pass https://www.blancoamor.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cookie_path / /;
    }
}
